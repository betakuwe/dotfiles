theme = "github_light_high_contrast"

[editor]
line-number = "relative"
scroll-lines = 1
cursorline = true
completion-timeout = 5
rulers = [81, 101, 121]
bufferline = "multiple"
color-modes = true
jump-label-alphabet = "fjdkslaruvneicmwoxpzqghtyb"

[editor.statusline]
left = ["mode", "spinner", "file-name", "read-only-indicator", "file-modification-indicator"]
center = ["version-control"]
right = ["diagnostics", "selections", "register", "position", "position-percentage", "file-encoding", "file-type"]

[editor.lsp]
# display-inlay-hints = true

[editor.indent-guides]
render = true

[editor.soft-wrap]
enable = true

[editor.cursor-shape]
insert = "bar"
normal = "block"
select = "underline"

[keys.normal]
tab = "move_parent_node_end"
S-tab = "move_parent_node_start"
G = ":reset-diff-change"
A-x = "select_line_above"

[keys.insert]
S-tab = "move_parent_node_start"
"C-]" = ":buffer-next"
"C-[" = ":buffer-previous"

[keys.select]
tab = "extend_parent_node_end"
S-tab = "extend_parent_node_start"
"C-]" = ":buffer-next"
"C-[" = ":buffer-previous"

[keys.normal.space]
"space" = ":format"
